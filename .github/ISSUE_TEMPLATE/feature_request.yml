name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We love hearing what would make Sluice more useful for your team.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or workflow gap. The more specific, the better.
      placeholder: "When a Celery worker OOM-kills during our nightly reconciliation, I have no way to know which specific task was lost..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe your ideal solution. Screenshots, mockups, or references to other tools are welcome.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Sluice would this affect?
      options:
        - Dashboard (web UI)
        - SDK (Python pip package)
        - Agent (Go data collector)
        - Alerts / Notifications
        - API
        - Other
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - "Would pay more for this"
        - "Would significantly improve my workflow"
        - "Nice to have"
        - "Just an idea"
    validations:
      required: true
